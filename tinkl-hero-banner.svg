<svg viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient: deep indigo/night sky -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0A1A"/>
      <stop offset="45%" stop-color="#171235"/>
      <stop offset="100%" stop-color="#241947"/>
    </linearGradient>

    <!-- Glow blobs -->
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5E6AD2" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5E6AD2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#61DAFB" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#61DAFB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B6B" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#FF6B6B" stop-opacity="0"/>
    </radialGradient>

    <!-- Glass panel gradient -->
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.04"/>
    </linearGradient>

    <linearGradient id="wordmark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C9CEFF"/>
    </linearGradient>

    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C8AFF"/>
      <stop offset="100%" stop-color="#5E6AD2"/>
    </linearGradient>

    <!-- Frosted glass blur -->
    <filter id="blurSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="glassBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>

    <clipPath id="cardClip">
      <rect x="120" y="90" width="960" height="300" rx="28"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="480" fill="url(#bg)"/>

  <!-- Ambient glow blobs behind the glass card -->
  <circle cx="260" cy="120" r="220" fill="url(#glow1)" filter="url(#blurSoft)"/>
  <circle cx="950" cy="380" r="260" fill="url(#glow2)" filter="url(#blurSoft)"/>
  <circle cx="700" cy="60" r="200" fill="url(#glow3)" filter="url(#blurSoft)"/>

  <!-- Glass card -->
  <g clip-path="url(#cardClip)">
    <rect x="120" y="90" width="960" height="300" fill="url(#glass)"/>
    <!-- subtle blurred glow bleeding through the glass -->
    <circle cx="300" cy="140" r="150" fill="#5E6AD2" opacity="0.25" filter="url(#blurSoft)"/>
    <circle cx="900" cy="330" r="170" fill="#61DAFB" opacity="0.18" filter="url(#blurSoft)"/>
  </g>

  <!-- Glass card border + top sheen -->
  <rect x="120" y="90" width="960" height="300" rx="28" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="1.5"/>
  <path d="M 148 91 Q 600 80 1052 91" stroke="rgba(255,255,255,0.35)" stroke-width="1" fill="none"/>

  <!-- Paw / droplet mark -->
  <g transform="translate(600,168)">
    <path d="M0,-34 C19,-34 34,-17 34,4 C34,30 18,46 0,46 C-18,46 -34,30 -34,4 C-34,-17 -19,-34 0,-34 Z"
          fill="url(#dropGrad)"/>
    <circle cx="-16" cy="-38" r="9" fill="url(#dropGrad)"/>
    <circle cx="16" cy="-38" r="9" fill="url(#dropGrad)"/>
    <circle cx="-30" cy="-18" r="8" fill="url(#dropGrad)"/>
    <circle cx="30" cy="-18" r="8" fill="url(#dropGrad)"/>
  </g>

  <!-- Wordmark -->
  <text x="600" y="278" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="72" font-weight="700" letter-spacing="6" fill="url(#wordmark)">TINKL</text>

  <!-- Tagline -->
  <text x="600" y="318" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="21" font-weight="400" letter-spacing="1" fill="rgba(255,255,255,0.75)">Every potty. Perfectly tracked.</text>

  <!-- Small feature pills -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.9)">
    <g transform="translate(288,352)">
      <rect x="0" y="0" width="130" height="34" rx="17" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.22)"/>
      <text x="65" y="22" text-anchor="middle">🐾 Multi-Pet</text>
    </g>
    <g transform="translate(435,352)">
      <rect x="0" y="0" width="150" height="34" rx="17" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.22)"/>
      <text x="75" y="22" text-anchor="middle">📡 Offline-First</text>
    </g>
    <g transform="translate(602,352)">
      <rect x="0" y="0" width="120" height="34" rx="17" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.22)"/>
      <text x="60" y="22" text-anchor="middle">⏰ Smart Alarms</text>
    </g>
    <g transform="translate(739,352)">
      <rect x="0" y="0" width="140" height="34" rx="17" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.22)"/>
      <text x="70" y="22" text-anchor="middle">📊 Stats &amp; Trends</text>
    </g>
  </g>
</svg>
